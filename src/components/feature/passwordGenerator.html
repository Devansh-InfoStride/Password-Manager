<!DOCTYPE html>
<html lang="en">

	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Password Generator</title>
		<link rel="stylesheet" href="../../styles/passwordGenerator.css">
	</head>

	<body>
		<div class="Heading">
			<h1>Welcome to the Password Generator</h1>
		</div>
		<div class="password-form">
			<form id="passwordForm" action="">
				<div class="form-group">
                    <label for="length">Password Length:</label>
                    <input type="number" id="length" name="length" min="8" max="128" required>
                </div>
                <div class="form-group">
                    <label for="name">What is your Name:</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="Date">What is your Date of Birth:</label>
                    <input type="date" id="Date" name="Date" required>
                </div>
                <div class="form-group">
                    <label for="petname">What is your Pet name:</label>
                    <input type="text" id="petname" name="petname">
                </div>
                <div class="form-group">
                    <label><input type="checkbox" id="includeUppercase" name="includeUppercase"> Include Uppercase Letters</label>
                </div>
                <div class="form-group">
                    <label><input type="checkbox" id="includeLowercase" name="includeLowercase"> Include Lowercase Letters</label>
                </div>
                <div class="form-group">
                    <label><input type="checkbox" id="includeNumbers" name="includeNumbers"> Include Numbers</label>
                </div>
                <div class="form-group">
                    <label><input type="checkbox" id="includeSymbols" name="includeSymbols"> Include Symbols</label>
                </div>
                <button type="submit">Generate Password</button>
			</form>
		</div>
        <div id="result" class="result-container" style="display: none; margin-top: 20px; text-align: center;">
            <h3>Your Generated Password:</h3>
            <div class="password-display">
                <input type="text" id="generatedPassword" readonly style="padding: 10px; width: 80%; font-family: monospace; font-size: 1.2rem; margin-bottom: 10px;">
                <button id="copyBtn" style="padding: 10px;">Copy</button>
            </div>
            <div id="strengthDisplay" class="strength-display" style="margin-top: 15px;">
                <p>Generated Password Strength: <span id="strength-text">-</span></p>
                <div class="strength-bar" style="background-color: #e5e7eb; height: 10px; border-radius: 5px; width: 80%; margin: 10px auto;">
                    <div id="strength-meter" class="strength-meter" style="height: 100%; width: 0%; border-radius: 5px; transition: width 0.3s ease;"></div>
                </div>
            </div>
        </div>
	</body>
	<script src="../../script/passwordStrength.js"></script>
	<script src="../../script/passwordGenerator.js"></script>

</html>
