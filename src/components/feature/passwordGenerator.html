<!DOCTYPE html>
<html lang="en">

	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Password Generator</title>
		<link rel="stylesheet" href="../../styles/header&Footer.css">
        <link rel="stylesheet" href="../../styles/passwordGenerator.css">
	</head>

	<body>
		<div id="header-placeholder"></div>

		<div class="Heading">
			<h1>Welcome to the Password Generator</h1>
		</div>
		<div class="password-form">
			<form id="passwordForm" action="">
				<div class="form-group">
                    <label for="length">Password Length:</label>
                    <input type="number" id="length" name="length" min="6" max="20" required>
                </div>
                <div class="form-group">
                    <label for="name">What is your Name:</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="Date">What is your Date of Birth:</label>
                    <input type="date" id="Date" name="Date" required>
                </div>
                <div class="form-group">
                    <label for="petname">What is your Pet name:</label>
                    <input type="text" id="petname" name="petname">
                </div>
                <div class="form-group">
                    <label for="platform">For Which Platform you want the password:</label>
                    <input type="text" id="platform" name="platform" placeholder="e.g. Gmail, Instagram">
                </div>
                <div class="form-group">
                    <label><input type="checkbox" id="includeUppercase" name="includeUppercase"> Include Uppercase Letters</label>
                </div>
                <div class="form-group">
                    <label><input type="checkbox" id="includeLowercase" name="includeLowercase"> Include Lowercase Letters</label>
                </div>
                <div class="form-group">
                    <label><input type="checkbox" id="includeNumbers" name="includeNumbers"> Include Numbers</label>
                </div>
                <div class="form-group">
                    <label><input type="checkbox" id="includeSymbols" name="includeSymbols"> Include Symbols</label>
                </div>
                <button type="submit">Generate Password</button>
			</form>
		</div>
        <div id="result" class="result-container" style="display: none; margin-top: 20px;">
            <h3 style="text-align: center;">Your Generated Passwords:</h3>
            <div id="passwordsList" class="passwords-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; margin-top: 15px;">
                <!-- Password items will be inserted here -->
            </div>
        </div>

		<div id="footer-placeholder"></div>
	</body>
	<script src="../../script/passwordStrength.js"></script>
	<script src="../../script/passwordGenerator.js"></script>
	<script src="../../script/layout.js"></script>

</html>
