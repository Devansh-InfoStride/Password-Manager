<!DOCTYPE html>
<html lang="en">

	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Password Strength Checker</title>
		<link rel="stylesheet" href="../styles/PasswordStrength.css">
	</head>

	<body>
		<div class="Heading">
			<h1>Welcome to the Password Strength Checker</h1>
		</div>
		<div class="password-form">
			<form id="passwordForm" action="./components/submit.html">
				<label for="password" class="formHeading">Enter your password:</label>
				<input type="password" id="password" name="password" placeholder="Enter a strong password" required>
				<label for="password" class="formHeading"> 
                    <input type="checkbox" onclick="togglePassword()"> 
                        Show Password
                    </label>
				<div id="strengthDisplay" class="strength-display" style="display: none;">
					<p>Password Strength: <span id="strength-text">-</span></p>
					<div class="strength-bar">
						<div id="strength-meter" class="strength-meter"></div>
					</div>
				</div>
				<button type="submit" id="submitBtn">Check Strength</button>
				<div id="result" class="result-display" style="display: none;">
					<h2>Password Analysis</h2>
					<p id="resultText"></p>
					<button type="button" onclick="resetForm()">Check Another</button>
				</div>
			</form>
		</div>
	</body>
	<script src="../script/passwordStrength.js"></script>

</html>
